<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página Web</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* Encabezado */

header{
    position:relative;
}

header img{
    width:100%;
    height:350px;
    object-fit:cover;
}

header h1{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:50px;
    background:rgba(0,0,0,.5);
    padding:15px 30px;
    border-radius:10px;
}

/* Barra */

nav{
    background:#1565c0;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
}

nav li{
    padding:18px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

nav a:hover{
    color:yellow;
}

section{
    width:90%;
    margin:40px auto;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

/* Tabla */

table{
    width:100%;
    border-collapse:collapse;
}

td{
    border:1px solid #999;
    text-align:center;
    padding:10px;
}

td img{
    width:180px;
    height:120px;
    border-radius:8px;
    object-fit:cover;
}

/* Carrusel */

.slider{
    width:800px;
    height:400px;
    margin:auto;
    overflow:hidden;
    border-radius:10px;
}

.slider ul{
    display:flex;
    padding:0;
    width:400%;
    animation:slide 16s infinite;
}

.slider li{
    width:100%;
    list-style:none;
}

.slider img{
    width:100%;
    height:400px;
    object-fit:cover;
}

@keyframes slide{

0%,20%{
margin-left:0;
}

25%,45%{
margin-left:-100%;
}

50%,70%{
margin-left:-200%;
}

75%,100%{
margin-left:-300%;
}

}

video{
    width:800px;
    max-width:100%;
    display:block;
    margin:auto;
    border-radius:10px;
}

footer{
    background:#1565c0;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>
